<!-- ══════════════════════════════════════════════
  🔥 FIREBASE CONFIG — 請換成你自己的設定值！
     步驟：https://console.firebase.google.com
     建立專案 → 新增網頁應用 → 複製 firebaseConfig → 貼在這裡
════════════════════════════════════════════════ -->
<script type="module">
import { initializeApp }       from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
                                from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, serverTimestamp }
                                from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ▼▼▼ 換成你的 Firebase config ▼▼▼
const firebaseConfig = {
  apiKey: "AIzaSyAjLSzfkSaSaMUh8ykgXfqCz96VzBiezdQ",
  authDomain: "mi-diccionario-b03f7.firebaseapp.com",
  projectId: "mi-diccionario-b03f7",
  storageBucket: "mi-diccionario-b03f7.firebasestorage.app",
  messagingSenderId: "486803043132",
  appId: "1:486803043132:web:07475538f8748b54e12439"
};
// ▲▲▲ 換成你的 Firebase config ▲▲▲

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);
const provider = new GoogleAuthProvider();

let currentUser = null;
let unsubscribeSnapshot = null;
let vocabCache = []; // local mirror of Firestore data

// ── AUTH ──────────────────────────────────────────────────
window._signIn = async () => {
  try { await signInWithPopup(auth, provider); }
  catch(e) { showToast('登入失敗：' + e.message); }
};
window._signOut = async () => {
  if (!confirm('確定要登出嗎？')) return;
  if (unsubscribeSnapshot) unsubscribeSnapshot();
  await signOut(auth);
  vocabCache = [];
  renderVocabList();
};

onAuthStateChanged(auth, user => {
  currentUser = user;
  updateAuthUI(user);
  if (user) {
    listenVocab(user.uid);
  } else {
    if (unsubscribeSnapshot) { unsubscribeSnapshot(); unsubscribeSnapshot = null; }
    vocabCache = [];
    renderVocabList();
  }
});

function updateAuthUI(user) {
  const loginArea  = document.getElementById('auth-area');
  const userArea   = document.getElementById('user-area');
  const userAvatar = document.getElementById('user-avatar');
  const userName   = document.getElementById('user-name');
  if (user) {
    loginArea.style.display = 'none';
    userArea.style.display  = 'flex';
    userAvatar.src          = user.photoURL || '';
    userAvatar.style.display= user.photoURL ? 'block' : 'none';
    userName.textContent    = user.displayName || user.email;
  } else {
    loginArea.style.display = 'flex';
    userArea.style.display  = 'none';
  }
}

// ── FIRESTORE ─────────────────────────────────────────────
function vocabRef(uid) {
  return collection(db, 'users', uid, 'vocabulary');
}

function listenVocab(uid) {
  if (unsubscribeSnapshot) unsubscribeSnapshot();
  unsubscribeSnapshot = onSnapshot(vocabRef(uid), snap => {
    vocabCache = [];
    snap.forEach(d => vocabCache.push({ id: d.id, ...d.data() }));
    // sort newest first
    vocabCache.sort((a,b) => (b.savedAt?.seconds||0) - (a.savedAt?.seconds||0));
    renderVocabList();
    document.getElementById('vocab-count').textContent = vocabCache.length;
  });
}

window._saveToFirestore = async (item) => {
  if (!currentUser) { showToast('請先登入才能儲存單字'); return; }
  const id = item.es.toLowerCase().replace(/[^a-z0-9]/g, '_').slice(0,50) + '_' + Date.now();
  await setDoc(doc(vocabRef(currentUser.uid), id), {
    es: item.es, en: item.en, zh: item.zh,
    savedAt: serverTimestamp()
  });
  showToast('已加入單字本 ✓');
  // update result button
  const btn = document.getElementById('save-result-btn');
  if (btn) { btn.textContent = '✓ 已收錄'; btn.classList.add('saved'); btn.disabled = true; }
};

window._deleteFromFirestore = async (id) => {
  if (!currentUser) return;
  await deleteDoc(doc(vocabRef(currentUser.uid), id));
  showToast('已刪除');
};

window._updateInFirestore = async (id, es, en, zh) => {
  if (!currentUser) return;
  await setDoc(doc(vocabRef(currentUser.uid), id), {
    es, en, zh, savedAt: serverTimestamp()
  }, { merge: true });
  showToast('已儲存修改 ✓');
};

window._getVocabCache = () => vocabCache;

// ── NORMALIZE（去除音調，ñ→n，á→a …）────────────────────
function norm(str) {
  if (!str) return '';
  return str.normalize('NFD')           // 把組合字元拆開，例如 á → a + ́
            .replace(/[\u0300-\u036f]/g, '') // 移除所有組合音調符號
            .toLowerCase();
}

// ── VOCAB RENDER ──────────────────────────────────────────
window.renderVocabList = function() {
  const vocab   = vocabCache;
  const query   = norm(document.getElementById('list-search')?.value.trim() || '');
  const filtered = query
    ? vocab.filter(v =>
        norm(v.es).includes(query) ||
        norm(v.en).includes(query) ||
        (v.zh||'').includes(query))   // 中文不需正規化
    : vocab;

  document.getElementById('vocab-count').textContent = vocab.length;
  const container = document.getElementById('vocab-list');
  if (!container) return;

  if (!currentUser) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🔐</div>
      <p>請先登入 Google 帳號<br>才能查看和儲存你的單字本</p></div>`;
    return;
  }

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📖</div>
      <p>${vocab.length === 0 ? '單字本還是空的，快去查詢並收錄你的第一個單字吧！' : '沒有符合搜尋的單字。'}</p>
    </div>`;
    return;
  }

  container.innerHTML = filtered.map(item => `
    <div class="vocab-item" id="vitem-${item.id}">
      <div class="vocab-es">${escHtml(item.es)}</div>
      <div class="vocab-divider"></div>
      <div class="vocab-trans">
        <div class="vocab-en">🇬🇧 ${escHtml(item.en||'—')}</div>
        <div class="vocab-zh">🇹🇼 ${escHtml(item.zh||'—')}</div>
      </div>
      <div class="vocab-actions">
        <button class="icon-btn" onclick="speakES(${JSON.stringify(item.es)})" title="發音">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        </button>
        <button class="icon-btn" onclick="editItem(${JSON.stringify(item.id)})" title="編輯">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zm17.71-10.46a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
        </button>
        <button class="icon-btn delete" onclick="deleteItem(${JSON.stringify(item.id)})" title="刪除">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
        </button>
      </div>
    </div>`).join('');
};

// ── EDIT ─────────────────────────────────────────────────
window.editItem = function(id) {
  const item = vocabCache.find(v => v.id === id);
  if (!item) return;
  const el = document.getElementById(`vitem-${id}`);
  el.innerHTML = `
    <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="lang-badge badge-es">ES</span>
        <input id="edit-es-${id}" style="flex:1;padding:6px 10px;border:1.5px solid var(--border);border-radius:6px;font-family:'Playfair Display',serif;font-size:1rem;color:var(--terracotta);" value="${escHtml(item.es)}"/>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="lang-badge badge-en">EN</span>
        <input id="edit-en-${id}" style="flex:1;padding:6px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:0.9rem;" value="${escHtml(item.en||'')}"/>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="lang-badge badge-zh">中文</span>
        <input id="edit-zh-${id}" style="flex:1;padding:6px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:0.9rem;" value="${escHtml(item.zh||'')}"/>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px;">
        <button class="btn btn-primary btn-sm" onclick="saveEdit(${JSON.stringify(id)})">儲存</button>
        <button class="btn btn-outline btn-sm" onclick="renderVocabList()">取消</button>
      </div>
    </div>`;
};

window.saveEdit = async function(id) {
  const es = document.getElementById(`edit-es-${id}`).value.trim();
  const en = document.getElementById(`edit-en-${id}`).value.trim();
  const zh = document.getElementById(`edit-zh-${id}`).value.trim();
  await _updateInFirestore(id, es, en, zh);
};

window.deleteItem = async function(id) {
  if (!confirm('確定要刪除這個單字嗎？')) return;
  await _deleteFromFirestore(id);
};

// ── EXPORT ───────────────────────────────────────────────
window.exportCSV = function() {
  const vocab = vocabCache;
  if (!vocab.length) { showToast('單字本是空的！'); return; }
  const rows = [['Spanish','English','Chinese']].concat(vocab.map(v=>[v.es,v.en||'',v.zh||'']));
  const csv  = rows.map(r=>r.map(c=>`"${c.replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url; a.download='mi_diccionario.csv'; a.click();
  URL.revokeObjectURL(url);
};

</script>

<script>

    <button class="btn btn-outline btn-sm" onclick="exportCSV()">📤 匯出 CSV</button>
  </div>
  <div id="vocab-list">
    <div class="empty-state"><div class="empty-icon">🔐</div><p>請先登入 Google 帳號<br>才能查看和儲存你的單字本</p></div>
  </div>

</div>

<div id="toast"></div>

<script>
// ── LANG TABS ─────────────────────────────────────────────
let currentMode = 'es-zh';
let lastResult  = null;

document.querySelectorAll('.lang-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lang-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    const ph = {'es-zh':'輸入西班牙文…','zh-es':'輸入中文…','en-es':'Enter English…'};
    document.getElementById('search-input').placeholder = ph[currentMode];
    document.getElementById('result-area').innerHTML = '';
    document.getElementById('status-msg').className = 'status-msg';
    document.getElementById('search-input').value = '';
    document.getElementById('search-input').focus();
  });
});
document.getElementById('search-input').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });

// ── TRANSLATE ─────────────────────────────────────────────
async function translate(text, from, to) {
  const url  = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`;
  const res  = await fetch(url);
  const data = await res.json();
  if (data.responseStatus === 200) return data.responseData.translatedText;
  throw new Error(data.responseDetails || 'Translation failed');
}

async function doSearch() {
  const input = document.getElementById('search-input').value.trim();
  if (!input) return;
  const btn    = document.getElementById('search-btn');
  const status = document.getElementById('status-msg');
  btn.disabled = true;
  status.textContent = '翻譯中…'; status.className = 'status-msg loading';
  document.getElementById('result-area').innerHTML = '';
  try {
    let es='', en='', zh='';
    if (currentMode === 'es-zh') {
      es = input;
      [en, zh] = await Promise.all([translate(input,'es','en'), translate(input,'es','zh-CN')]);
    } else if (currentMode === 'zh-es') {
      zh = input; es = await translate(input,'zh-CN','es'); en = await translate(es,'es','en');
    } else {
      en = input; es = await translate(input,'en','es'); zh = await translate(es,'es','zh-CN');
    }
    lastResult = { es, en, zh };
    renderResult(es, en, zh);
    status.className = 'status-msg';
  } catch(err) {
    status.textContent = '⚠️ 查詢失敗，請確認網路連線或稍後再試。';
    status.className = 'status-msg error';
  } finally { btn.disabled = false; }
}

function renderResult(es, en, zh) {
  const vocab   = window._getVocabCache ? window._getVocabCache() : [];
  const already = vocab.some(v => v.es?.toLowerCase() === es.toLowerCase());
  document.getElementById('result-area').innerHTML = `
    <div class="result-card">
      <div class="result-top">
        <div class="result-word">
          <div class="es-word">${escHtml(es)}</div>
          <div class="word-type">西班牙文</div>
        </div>
        <button class="speak-btn" onclick="speakES(${JSON.stringify(es)})" title="播放發音">
          <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        </button>
      </div>
      <div class="translations">
        <div class="trans-row"><span class="lang-badge badge-en">EN</span><span class="trans-text">${escHtml(en)}</span></div>
        <div class="trans-row"><span class="lang-badge badge-zh">中文</span><span class="trans-text">${escHtml(zh)}</span></div>
      </div>
      <div class="result-actions">
        <button class="btn btn-save${already?' saved':''}" id="save-result-btn"
          onclick="window._saveToFirestore && window._saveToFirestore(${JSON.stringify({es,en,zh})})"
          ${already?'disabled':''}>
          ${already ? '✓ 已收錄' : '＋ 加入單字本'}
        </button>
        <span style="font-size:0.78rem;color:var(--muted);">翻譯如有誤差可在單字本手動修改</span>
      </div>
    </div>`;
}

// ── SPEECH（ResponsiveVoice 線上 TTS）────────────────────
function speakES(text) {
  if (typeof responsiveVoice === 'undefined') {
    showToast('⚠️ 語音服務載入中，請確認網路連線');
    return;
  }
  responsiveVoice.cancel();
  responsiveVoice.speak(text, 'Spanish Female', { rate: 0.9 });
}

// ── TOAST / UTILS ─────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
window.showToast = showToast;

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
window.escHtml = escHtml;
</script>
</body>
</html>
